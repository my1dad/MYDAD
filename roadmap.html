<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Over Drive Roadmap — plan, track, and ship operational systems across phases and milestones."
    />
    <title>Over Drive Roadmap</title>
    <style>
      @keyframes initial-preloader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes initial-preloader-pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes initial-preloader-glow {
        0%,
        100% {
          opacity: 0.45;
          transform: scale(0.94);
        }
        50% {
          opacity: 0.85;
          transform: scale(1.04);
        }
      }
      @keyframes initial-preloader-panel-enter {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      #initial-preloader {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        isolation: isolate;
      }
      #initial-preloader-backdrop {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 35%, rgba(99, 102, 241, 0.14), transparent 52%),
          radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.08), transparent 40%),
          linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(241, 245, 249, 0.88));
        backdrop-filter: blur(10px);
      }
      #initial-preloader-card {
        position: relative;
        width: fit-content;
        max-width: calc(100vw - 2.5rem);
        overflow: hidden;
        isolation: isolate;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.82);
        background:
          radial-gradient(120% 85% at 50% -8%, rgba(238, 242, 255, 0.98), transparent 58%),
          linear-gradient(168deg, rgba(255, 255, 255, 0.96) 0%, rgba(248, 250, 252, 0.86) 100%);
        backdrop-filter: blur(18px) saturate(1.18);
        -webkit-backdrop-filter: blur(18px) saturate(1.18);
        padding: 2rem 1.15rem 1.85rem;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.98),
          inset 0 0 0 1px rgba(99, 102, 241, 0.06),
          0 2px 4px rgba(15, 23, 42, 0.03),
          0 14px 28px -10px rgba(79, 70, 229, 0.16),
          0 22px 44px -18px rgba(15, 23, 42, 0.09);
        animation: initial-preloader-panel-enter 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #initial-preloader-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          radial-gradient(ellipse 88% 52% at 50% -18%, rgba(129, 140, 248, 0.14), transparent 64%),
          radial-gradient(ellipse 70% 42% at 50% 118%, rgba(59, 130, 246, 0.06), transparent 58%),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.62) 0%,
            rgba(255, 255, 255, 0.14) 20%,
            transparent 42%
          );
        pointer-events: none;
        z-index: 0;
      }
      #initial-preloader-card::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: calc(1.5rem - 1px);
        border: 1px solid rgba(255, 255, 255, 0.62);
        pointer-events: none;
        z-index: 0;
      }
      #initial-preloader-shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
      }
      #initial-preloader-stage {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #initial-preloader-glow {
        position: absolute;
        inset: -0.85rem;
        border-radius: 9999px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.22), transparent 68%);
        animation: initial-preloader-glow 1.2s ease-in-out infinite;
      }
      #initial-preloader-ring {
        position: relative;
        width: 7rem;
        height: 7rem;
        flex-shrink: 0;
      }
      #initial-preloader-ring .track {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 2px solid rgba(226, 232, 240, 0.95);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
      }
      #initial-preloader-ring .spin {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 3px solid transparent;
        border-top-color: #4f46e5;
        border-right-color: #818cf8;
        filter: drop-shadow(0 0 6px rgba(99, 102, 241, 0.35));
        animation: initial-preloader-spin 0.75s linear infinite;
      }
      #initial-preloader-ring .logo-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: initial-preloader-pulse 1.2s ease-in-out infinite;
      }
      #initial-preloader-ring .logo {
        display: block;
        width: 80px;
        height: 80px;
        max-width: 80px;
        max-height: 80px;
        object-fit: contain;
        filter: drop-shadow(0 8px 14px rgba(79, 70, 229, 0.16));
      }
      #initial-preloader-copy {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.15rem;
        text-align: center;
      }
      #initial-preloader-kicker {
        margin: 0;
        font:
          700 0.65rem/1.2 Inter,
          system-ui,
          sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #94a3b8;
      }
      #initial-preloader-brand {
        margin: 0;
        font:
          700 1.05rem/1.2 Inter,
          system-ui,
          sans-serif;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #312e81 0%, #4f46e5 45%, #2563eb 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <script>
      if (!window.location.hash || window.location.hash === "#/" || window.location.hash === "#") {
        window.location.replace(`${window.location.pathname}${window.location.search}#/login`)
      }
    </script>
    <div id="root">
      <div id="initial-preloader" aria-live="polite" aria-label="Loading OverDrive">
        <div id="initial-preloader-backdrop" aria-hidden="true"></div>
        <div id="initial-preloader-card">
          <div id="initial-preloader-shell">
            <div id="initial-preloader-stage">
              <span id="initial-preloader-glow" aria-hidden="true"></span>
              <div id="initial-preloader-ring">
                <span class="track" aria-hidden="true"></span>
                <span class="spin" aria-hidden="true"></span>
                <span class="logo-wrap" aria-hidden="true">
                  <img class="logo" src="./over-drive-logo-transparent.png" alt="" />
                </span>
              </div>
            </div>
            <div id="initial-preloader-copy">
              <p id="initial-preloader-kicker">Loading</p>
              <p id="initial-preloader-brand">OverDrive</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/roadmap-main.jsx"></script>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || root.dataset.booted === "1") return;
        root.innerHTML =
          '<div style="padding:2rem;font-family:system-ui,sans-serif;max-width:32rem">' +
          '<p style="color:#b91c1c;font-weight:600;margin:0 0 0.5rem">App failed to start</p>' +
          '<p style="color:#475569;margin:0 0 1rem;font-size:14px">The JavaScript bundle did not load. Hard refresh (Cmd+Shift+R) or restart the dev server.</p>' +
          '<p style="color:#64748b;margin:0;font-size:13px">Open <a href="./roadmap.html#/login">roadmap.html#/login</a></p>' +
          "</div>";
      }, 12000);
    </script>
  </body>
</html>
